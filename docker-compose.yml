version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: construction_transport_server
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    working_dir: /app

  redis:
    image: redis:7
    ports:
      - "6379:6379"
